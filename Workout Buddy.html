<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Workout Buddy</title>
<link rel="stylesheet" href="styles.css" />
<style>
  html, body { height: 100%; }
  body {
    background: var(--wb-page);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  #stage {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn  { 0% { transform: scale(0.85); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
  @keyframes slideUp { from { transform: translateY(8px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .screen-anim { animation: slideUp 220ms ease-out; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="workout.jsx"></script>
<script type="text/babel" src="history.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "heroStyle": "illustration",
  "showFrame": false
}/*EDITMODE-END*/;

function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
  const [tab, setTab] = useState('home');
  const [selectedSession, setSelectedSession] = useState(null);

  // When entering History tab, clear any drilled-in detail.
  useEffect(() => { if (tab !== 'history') setSelectedSession(null); }, [tab]);

  // Selecting a session from Home jumps to History detail
  const openSession = (s) => { setSelectedSession(s); setTab('history'); };

  let screen = null;
  if (tab === 'home') {
    screen = <HomeScreen
      onStart={() => setTab('workout')}
      onSelectSession={openSession}
      heroStyle={tweaks.heroStyle} />;
  } else if (tab === 'workout') {
    screen = <WorkoutScreen
      onFinish={() => { setTab('home'); }}
      onCancel={() => setTab('home')} />;
  } else if (tab === 'history') {
    screen = <HistoryScreen
      selectedSession={selectedSession}
      onSelectSession={setSelectedSession}
      onBack={() => setSelectedSession(null)} />;
  }

  const appShell = (
    <div className="wb-app" data-screen-label={tab === 'home' ? 'Home' : tab === 'workout' ? 'Workout' : selectedSession ? 'History · Detail' : 'History'}>
      <div key={tab + (selectedSession?.id || '')} className="screen-anim" style={{ height: '100%' }}>
        {screen}
      </div>
      <BottomNav active={tab} onChange={(t) => { setSelectedSession(null); setTab(t); }} />
    </div>
  );

  return (
    <div id="stage">
      {tweaks.showFrame ? (
        <IOSDevice width={402} height={874}>
          {appShell}
        </IOSDevice>
      ) : (
        <div style={{
          width: 402, height: 874, borderRadius: 28, overflow: 'hidden',
          boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.10)',
        }}>{appShell}</div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection title="Hero card art">
          <TweakRadio
            value={tweaks.heroStyle}
            onChange={(v) => setTweak('heroStyle', v)}
            options={[
              { value: 'gradient', label: 'Gradient' },
              { value: 'typographic', label: 'Type' },
              { value: 'illustration', label: 'Illus.' },
            ]} />
        </TweakSection>
        <TweakSection title="Display">
          <TweakToggle
            label="iPhone frame"
            value={tweaks.showFrame}
            onChange={(v) => setTweak('showFrame', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
